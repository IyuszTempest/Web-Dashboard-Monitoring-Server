<div class="max-w-6xl mx-auto glass rounded-[30px] p-8">
    <div class="flex justify-between mb-6">
        <input type="file" id="fileInput" class="hidden" onchange="uploadFile()">
        <button onclick="document.getElementById('fileInput').click()" class="bg-purple-600 px-6 py-2 rounded-full font-black text-[10px] uppercase">＋ Upload File</button>
        <button onclick="loadFiles()" class="opacity-50 font-black text-[10px] uppercase italic">Refresh List</button>
    </div>

    <div class="overflow-hidden rounded-xl border border-white/5">
        <table class="w-full text-left">
            <thead class="bg-white/5 text-[10px] font-black uppercase opacity-50">
                <tr>
                    <th class="p-4">Name</th>
                    <th class="p-4">Size</th>
                    <th class="p-4 text-right">Actions</th>
                </tr>
            </thead>
            <tbody id="fileList"></tbody>
        </table>
    </div>
</div>

<script>
    const API_BASE = "https://euphyserver.iyusztempest.my.id/api";

    async function loadFiles() {
        const res = await fetch(`${API_BASE}/files`);
        const files = await res.json();
        document.getElementById('fileList').innerHTML = files.map(f => `
            <tr class="border-t border-white/5 hover:bg-white/5">
                <td class="p-4 font-bold text-purple-300">${f.name}</td>
                <td class="p-4 opacity-50 text-xs">${f.size}</td>
                <td class="p-4 text-right flex justify-end gap-4">
                    <a href="${API_BASE}/download/${f.name}" class="text-blue-400 font-bold text-[10px] uppercase">Download</a>
                    <button onclick="deleteFile('${f.name}')" class="text-red-500 font-bold text-[10px] uppercase">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    async function uploadFile() {
        const file = document.getElementById('fileInput').files[0];
        const formData = new FormData();
        formData.append('file', file);
        
        await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
        alert('Upload Berhasil!');
        loadFiles();
    }

    async function deleteFile(name) {
        if(confirm('Hapus ' + name + '?')) {
            await fetch(`${API_BASE}/delete/${name}`, { method: 'DELETE' });
            loadFiles();
        }
    }
    loadFiles();
</script>
